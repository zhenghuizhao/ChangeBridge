# Latent Brownian Bridge Diffusion Model Template(Latent Space)
runner: "BBDMRunner"   #BBDMRunner_text
training:
  n_epochs: 300
  n_steps: 600000
  save_interval: 2      #20
  sample_interval: 2
  validation_interval: 2  #20
  accumulate_grad_batches: 4


testing:
  clip_denoised: False
  sample_num: 5


data:
  dataset_name: 'Second'
  dataset_type: 'change_detection_semantic'   # change_detection_text
  dataset_config:
    condition_type: 'semantic map'
    dataset_path: '/data1/zhenghui/Datasets/Semantic Change Detection/SECOND'
    image_size: 256
    channels: 3
    to_normal: True
    flip: False
  train:
    batch_size: 96   #8， 最大能使用32
    shuffle: True
  val:
    batch_size: 4   #4
    shuffle: True
  test:
    batch_size: 8  #8
    # shuffle: False

model:
  model_name: "LBBDM-f4" # part of result path
  model_type: "LBBDM" # specify a module
  latent_before_quant_conv: False
  normalize_latent: False
  only_load_latent_mean_std: False
#  model_load_path: /data1/zhenghui/Codes/Diffusion_CD/results/Second/LBBDM-f4/checkpoint/top_model_epoch_560.pth
#  optim_sche_load_path: /data/zhenghui.zhao/Code/Diffusion_CD/results/Second/LBBDM-f4/checkpoint/last_optim_sche.pth # optimizer scheduler checkpoint path
  in_channels: 6

  EMA:
    use_ema: True
    ema_decay: 0.995
    update_ema_interval: 8 # step    #16
    start_ema_step: 30000

  CondStageParams:
    n_stages: 2
    in_channels: 3
    out_channels: 3

  VQGAN:
    params:
      ckpt_path: 'results/VQGAN/model.ckpt'
      embed_dim: 3
      n_embed: 8192
      ddconfig:
        double_z: false
        z_channels: 3
        resolution: 256
        in_channels: 3
        out_ch: 3
        ch: 128
        ch_mult: !!python/tuple
          - 1
          - 2
          - 4
        num_res_blocks: 2
        attn_resolutions: [ ]
        dropout: 0.0

      lossconfig:
        target: torch.nn.Identity

  CLIP:
    ckpt_path: 'results/CLIP/SkyCLIP_ViT_B32.pt'

  BB:
    optimizer:
      weight_decay: 0.000
      optimizer: 'Adam'
      lr: 8.e-4  #1.e-4  * batch_size * gpu_num
      beta1: 0.9

    lr_scheduler:
      factor: 0.5
      patience: 3000
      threshold: 0.0001
      cooldown: 2000
      min_lr: 5.e-7 # 5.e-7


    params:
      mt_type: 'linear' # options {'linear', 'sin'}
      objective: 'grad' # options {'grad', 'noise', 'ysubx'}
      loss_type: 'l1' # options {'l1', 'l2'}

      skip_sample: True
      sample_type: 'linear' # options {"linear", "sin"}
      sample_step: 200

      num_timesteps: 1000 # timesteps
      eta: 1.0 # DDIM reverse process eta
      max_var: 1.0 # maximum variance

      UNetParams:
        image_size: 64
        in_channels: 3    #3
        model_channels: 128
        out_channels: 3
        num_res_blocks: 2
        attention_resolutions: !!python/tuple
          - 32
          - 16
          - 8
        channel_mult: !!python/tuple
          - 1
          - 4
          - 8
        conv_resample: True
        dims: 2
        num_heads: 8
        num_head_channels: 64
        use_scale_shift_norm: True
        resblock_updown: True
        use_spatial_transformer: False
        context_dim:
        condition_key: "nocond" # options {"SpatialRescaler", "first_stage", "nocond"} # "nocond"